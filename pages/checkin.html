<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>課程簽到 — 樂晨學苑教育訓練系統</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="../css/style.css">
<style>
body {
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; padding:20px; background:#f1f3f4;
}
.ci-card {
  background:#fff; border-radius:16px; padding:40px 28px;
  max-width:400px; width:100%; text-align:center;
  box-shadow:0 4px 24px rgba(0,0,0,.1);
}
.ci-icon  { font-size:52px; margin-bottom:16px; }
.ci-title { font-size:20px; font-weight:600; margin-bottom:8px; color:var(--gray-900); }
.ci-sub   { font-size:14px; color:var(--gray-600); margin-bottom:20px; }
.ci-info  {
  background:var(--gray-100); border-radius:8px;
  padding:14px; margin-bottom:20px;
  text-align:left; font-size:13px; line-height:1.9;
}
</style>
</head>
<body>
<div class="ci-card" id="card">
  <div class="loading"><span class="spinner"></span>&nbsp;驗證中…</div>
</div>

<script src="../js/config.js"></script>
<script>
(async () => {
  const params   = new URLSearchParams(location.search)
  const courseId = params.get('course')
  const token    = params.get('t')
  const card     = document.getElementById('card')

  function show(icon, title, sub, info = '', extra = '') {
    card.innerHTML = `
      <div class="ci-icon">${icon}</div>
      <div class="ci-title">${title}</div>
      <div class="ci-sub">${sub}</div>
      ${info}${extra}`
  }

  if (!courseId || !token) {
    show('⚠️', '無效的簽到連結', '請重新掃描 QR Code'); return
  }

  // ── 【資安強化】驗證 token ──────────────────────────────
  // token 格式：btoa(courseId|orgFragment|YYYY-MM-DD)
  let tokenValid = false
  try {
    const decoded = atob(token)
    const parts   = decoded.split('|')
    // parts[0] = courseId, parts[1] = orgFragment（12碼）, parts[2] = 日期
    const today   = new Date().toISOString().split('T')[0]
    tokenValid    = parts.length === 3 &&
                    parts[0] === courseId &&
                    parts[1].length === 12 &&          // orgFragment 長度驗證
                    /^[a-f0-9]+$/.test(parts[1]) &&    // 必須是 hex 字元
                    parts[2] === today                 // 當日有效
  } catch {
    tokenValid = false
  }

  if (!tokenValid) {
    show('⏰', 'QR Code 已失效',
      '每日上課時間由主辦單位產生新碼，請洽主辦單位重新掃描。')
    return
  }

  // ── 取得課程資訊 ───────────────────────────────────────
  const { data: course, error: courseErr } = await supabase
    .from('courses').select('*').eq('id', courseId).single()

  if (courseErr || !course) {
    show('❌', '課程不存在', '請確認連結是否正確'); return
  }

  const infoHtml = `
    <div class="ci-info">
      <div>課程：<strong>${course.title}</strong></div>
      <div>日期：<strong>${new Date(course.date).toLocaleDateString('zh-TW')}</strong></div>
      <div>地點：<strong>${course.location}</strong></div>
      <div>積分：<strong>${course.credits} 分</strong></div>
    </div>`

  // ── 確認是否已登入 ─────────────────────────────────────
  const { data: { session } } = await supabase.auth.getSession()

  if (!session) {
    show('📱', '請先登入', '登入後才能完成簽到', infoHtml,
      `<a href="${window.BASE_PATH}/index.html?redirect=${encodeURIComponent(location.href)}"
          class="btn-primary full-width">前往登入</a>`)
    return
  }

  // 確認 email 已驗證
  if (!session.user.email_confirmed_at) {
    show('📧', '請先驗證信箱', '請至信箱點擊驗證連結後再簽到', infoHtml)
    return
  }

  const uid = session.user.id

  // ── 確認是否有報名（正取才能簽到）────────────────────────
  const { data: enroll } = await supabase.from('enrollments').select('*')
    .eq('user_id', uid).eq('course_id', courseId).eq('status', 'enrolled')
    .maybeSingle()

  if (!enroll) {
    show('❌', '您未報名此課程', '僅正取學員可完成簽到，候補學員請等待通知。',
      infoHtml,
      `<a href="${window.BASE_PATH}/pages/student.html"
          class="btn-secondary full-width" style="margin-top:12px">返回學員頁面</a>`)
    return
  }

  // ── 已簽到 ─────────────────────────────────────────────
  if (enroll.attended) {
    const { data: prof } = await supabase.from('profiles').select('name').eq('id', uid).single()
    show('✅', '已完成簽到', `${prof?.name || ''}，您已出席本課程`, infoHtml,
      `<div class="success-msg" style="margin-bottom:12px">
         簽到時間：${new Date(enroll.attended_at).toLocaleString('zh-TW')}
       </div>
       <a href="${window.BASE_PATH}/pages/student.html"
          class="btn-secondary full-width">返回學員頁面</a>`)
    return
  }

  // ── 執行簽到 ───────────────────────────────────────────
  const now = new Date().toISOString()
  const { error: attErr } = await supabase.from('enrollments')
    .update({ attended: true, attended_at: now })
    .eq('id', enroll.id)

  if (attErr) {
    show('⚠️', '簽到失敗', '請重新整理頁面再試，或請主辦單位手動登記'); return
  }

  const { data: prof } = await supabase.from('profiles').select('name').eq('id', uid).single()

  card.innerHTML = `
    <div class="ci-icon">🎉</div>
    <div class="ci-title">簽到成功！</div>
    <div class="ci-sub">${prof?.name || ''}，歡迎參加課程</div>
    ${infoHtml}
    <div class="success-msg" style="margin-bottom:16px">
      出席積分將於課程結束後核入您的帳戶。
    </div>
    <a href="${window.BASE_PATH}/pages/student.html"
       class="btn-primary full-width">返回學員頁面</a>
  `
})()
</script>
</body>
</html>
