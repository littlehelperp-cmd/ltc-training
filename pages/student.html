<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>學員專區 — 長照教育訓練系統</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="app-wrapper">
  <header class="topbar">
    <div class="topbar-logo"><span class="badge">長照</span>教育訓練系統</div>
    <div class="topbar-right">
      <span class="user-info">學員：<strong id="user-name">載入中…</strong></span>
      <button class="btn-secondary btn-sm" onclick="logout()">登出</button>
    </div>
  </header>
  <div class="main-layout">
    <aside class="sidebar">
      <div class="nav-label">我的學習</div>
      <div class="nav-item active" onclick="showPage('dashboard',this)"><span class="icon">◈</span>總覽</div>
      <div class="nav-item" onclick="showPage('courses',this)"><span class="icon">📋</span>瀏覽課程</div>
      <div class="nav-item" onclick="showPage('enrollments',this)"><span class="icon">📌</span>我的報名</div>
      <div class="nav-item" onclick="showPage('credits',this)"><span class="icon">⭐</span>積分查詢</div>
    </aside>
    <main class="content">

      <!-- 總覽 -->
      <section class="page-section active" id="page-dashboard">
        <div class="page-header"><h2 class="page-title">學習總覽</h2></div>
        <div class="metric-grid">
          <div class="metric-card"><div class="metric-label">本年度積分</div><div class="metric-value green" id="m-credits">—</div></div>
          <div class="metric-card"><div class="metric-label">已完成課程</div><div class="metric-value" id="m-done">—</div></div>
          <div class="metric-card"><div class="metric-label">待上課程</div><div class="metric-value" id="m-upcoming">—</div></div>
          <div class="metric-card"><div class="metric-label">候補中</div><div class="metric-value amber" id="m-wait">—</div></div>
        </div>
        <div class="grid-2">
          <div class="card">
            <div class="card-title">積分進度</div>
            <div id="credit-bars"><div class="loading"><span class="spinner"></span>載入中…</div></div>
          </div>
          <div class="card">
            <div class="card-title">即將到來的課程</div>
            <div id="upcoming-list"><div class="loading"><span class="spinner"></span>載入中…</div></div>
          </div>
        </div>
      </section>

      <!-- 瀏覽課程 -->
      <section class="page-section" id="page-courses">
        <div class="page-header"><h2 class="page-title">課程報名</h2></div>
        <div class="flex gap-2 mb-4" style="flex-wrap:wrap">
          <input id="s-search" placeholder="搜尋課程…" oninput="filterCourses()"
            style="padding:8px 12px;border:1px solid #e8eaed;border-radius:6px;font-size:13px;width:200px">
          <select id="s-cat" onchange="filterCourses()"
            style="padding:8px 12px;border:1px solid #e8eaed;border-radius:6px;font-size:13px">
            <option value="">全部類別</option>
            <option>直接服務類</option><option>專業知識類</option><option>品質管理類</option>
          </select>
        </div>
        <div id="courses-list"><div class="loading"><span class="spinner"></span>載入課程…</div></div>
      </section>

      <!-- 我的報名 -->
      <section class="page-section" id="page-enrollments">
        <div class="page-header"><h2 class="page-title">我的報名紀錄</h2></div>
        <div class="card">
          <div class="table-wrap">
            <table>
              <thead><tr><th>課程名稱</th><th>日期</th><th>地點</th><th>積分</th><th>狀態</th><th>出席</th></tr></thead>
              <tbody id="enroll-tbody"><tr><td colspan="6" class="loading">載入中…</td></tr></tbody>
            </table>
          </div>
        </div>
      </section>

      <!-- 積分查詢 -->
      <section class="page-section" id="page-credits">
        <div class="page-header"><h2 class="page-title">長照積分查詢</h2></div>
        <div class="grid-2">
          <div class="card"><div class="card-title">積分總覽</div><div id="credits-summary"><div class="loading"><span class="spinner"></span>載入中…</div></div></div>
          <div class="card">
            <div class="card-title">積分明細</div>
            <div class="table-wrap">
              <table>
                <thead><tr><th>日期</th><th>課程</th><th>積分</th><th>狀態</th></tr></thead>
                <tbody id="credits-tbody"><tr><td colspan="4" class="loading">載入中…</td></tr></tbody>
              </table>
            </div>
          </div>
        </div>
      </section>

    </main>
  </div>
</div>

<!-- 報名 Modal -->
<div id="enroll-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal">
    <h3 class="modal-title" id="modal-title">課程報名</h3>
    <div id="modal-info" class="banner banner-green mb-4"></div>
    <form onsubmit="submitEnroll(event)">
      <div class="form-grid-2">
        <div class="form-field"><label>姓名 <span class="req">*</span></label><input type="text" id="e-name" required></div>
        <div class="form-field"><label>身分證字號 <span class="req">*</span></label><input type="text" id="e-id" required maxlength="10"></div>
        <div class="form-field"><label>服務機構</label><input type="text" id="e-org"></div>
        <div class="form-field"><label>機構別</label>
          <select id="e-org-type"><option value="">請選擇</option><option>A單位</option><option>B單位</option><option>C單位</option><option>其他</option></select>
        </div>
        <div class="form-field span-2"><label>照顧服務員證照字號</label><input type="text" id="e-license" placeholder="選填"></div>
      </div>
      <div id="e-error"   class="error-msg"   style="display:none"></div>
      <div id="e-success" class="success-msg" style="display:none"></div>
      <div class="modal-actions">
        <button type="button" class="btn-secondary" onclick="document.getElementById('enroll-modal').style.display='none'">取消</button>
        <button type="submit" class="btn-primary" id="e-submit">確認報名</button>
      </div>
    </form>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/student.js"></script>
</body>
</html>
